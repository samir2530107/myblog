<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .boxA {
            width: 100px;
            height: 150px;
            border: 2px solid red;
            display: inline-block;
        }

        .boxB {
            width: 100px;
            height: 150px;
            border: 2px solid blue;
            display: inline;
            /* in inline mode height and width does not apply */
        }

        .boxC {
            width: 100px;
            height: 150px;
            border: 2px solid green;
            display: inline-block;
        }
        .sp1{
            display: block;/* using none diplay will not display anything  */
        }
    </style>

</head>

<body>
    <div class="boxA"> BoxA</div>
    <div class="boxB"> BoxB</div>
    <div class="boxC"> BoxC</div>
    <span class="sp1"> 1.This is a span element.</span>
    <span> 2.This is a span element.</span>
</body>

</html>
