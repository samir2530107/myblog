<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .parent{
        width: 300px;
        height: 200px;
        background-color: yellow;
        position: relative;

    }
    .child{
        width: 100px;
        height: 100px;
        background-color: red;
        position: absolute;
        top: 50px;
        left: 50px;
    }
     </style>
</head>
<body>
    <div class="parent">
        Parent box.
    </div>
    <div class="child">
        Child box.
</body>
</html>
