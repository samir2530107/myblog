<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: aqua;
        }

        .card {
            margin: 0 auto;
            width: 300px;
            border: 1px solid red;
            border-radius: 10px;
            padding: 16px;
            background-color: white;
            text-align: center;
            
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .card button {
            margin-top: 10px;
            padding: 10px 16px; /* 1st value is top and bottom, 2nd is left and right */
            background-color: royalblue;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="https://picsum.photos/300/200" alt="pic">
        <h2>Card Title</h2>
        <p> This is a simple card example.</p>
        <button>Read More</button>
    </div>
</body>

</html>
