<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar {
            display: flex;
            gap: 30px;
            background-color: aqua;
            padding: 15px 30px;
        }

        .navbar a {
            color: black;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        .navbar a:hover {
            background-color: yellow;
            text-decoration: underline;
        }

        @media(max-width:600px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;

            }

            .menu {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">WebShop</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Products</a>
            <a href="#">Contacts</a>
        </div>
    </div>
</body>

</html>
