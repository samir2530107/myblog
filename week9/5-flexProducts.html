<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            background-color: aquamarine;
            padding: 30px;
        }

        .card {
            width: 180px;
            padding: 20px;
            background-color: white;
            border: 1px solid red;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Product List</h1>
    <div class="container">
        <div class="card">Laptop</div>
        <div class="card">Mouse</div>
        <div class="card">Keyboard</div>
        <div class="card">Monitor</div>
    </div>
</body>

</html>
