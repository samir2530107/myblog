<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0f172a;
  color: white;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 8%;
  background-color: #1e293b;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #38bdf8;
}

.menu a {
  color: #cbd5e1;
  text-decoration: none;
  margin-left: 20px;
}

/* Main Layout */
.container {
  padding: 30px 8%;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background-color: #171e56;
  padding: 24px;
  border-radius: 16px;
}

.card h3 {
  font-size: 14px;
  color: #94a3b8;
}

.card p {
  font-size: 28px;
  margin: 10px 0 0; /* top margin 10px, no right/left margin, no bottom margin */
  color: #38bdf8;
}

/* Chart area */
.chart-section {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.chart, .list {
  /* background-color: #171e56; */
  background-color: rgb(255, 0, 230);
  padding: 24px;
  border-radius: 16px;
}

/* Fake Chart */
.bars {
  display: flex;
  align-items: flex-end;
  /* align-items: flex-start; */
  gap: 10px;
  height: 200px;
  /* height: 100px; */
  margin-top: 20px;
  border : 1px solid red;
}

.bar {
  flex: 1;
  /* background-color: #38bdf8; */
  background-color: #3bf838;
  border-radius: 6px;
}

/* Activity list */
.item {
  padding: 10px 0;
  border-bottom: 1px solid #334155;
}

/* Responsive */
@media (max-width: 900px) {
  .stats {
    grid-template-columns: repeat(2, 1fr);
  }

  .chart-section {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 600px) {
  .stats {
    grid-template-columns: 1fr;
  }

  .header {
    flex-direction: column;
    gap: 10px;
  }
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">DataPro</div>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
    <a href="aboutme.html">About Me</a>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="card">
      <h3>Visitors</h3>
      <p>8,420</p>
    </div>

    <div class="card">
      <h3>Sales</h3>
      <p>$12,300</p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <p>1,230</p>
    </div>

    <div class="card">
      <h3>Users</h3>
      <p>3,100</p>
    </div>
  </div>

  <!-- Chart + List -->
  <div class="chart-section">

    <div class="chart">
      <h2>Sales Chart</h2>

      <div class="bars">
        <div class="bar" style="height: 40%"></div>
        <div class="bar" style="height: 60%"></div>
        <div class="bar" style="height: 80%"></div>
        <div class="bar" style="height: 50%"></div>
        <div class="bar" style="height: 90%"></div>
        <div class="bar" style="height: 70%"></div>
      </div>
    </div>

    <div class="list">
      <h2>Recent Activity</h2>

      <div class="item">User John signed up</div>
      <div class="item">New order received</div>
      <div class="item">Product updated</div>
      <div class="item">Payment completed</div>
    </div>

  </div>

</div>

</body>
</html>
